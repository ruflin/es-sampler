{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "es-sampler.fullname" . }}
  labels:
    {{- include "es-sampler.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "es-sampler.selectorLabels" . | nindent 6 }}
  # Deny all ingress — es-sampler is a closed-loop worker with no in-cluster consumers.
  # Egress is restricted to DNS (port 53) and HTTPS (port 443) for external Elasticsearch.
  # If you co-locate workloads in the same namespace that listen on 443, tighten this
  # with `to: ipBlock: cidr: 0.0.0.0/0 except: [<clusterCidr>, <serviceCidr>]`.
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
